<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PetCare | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 🌑 Dark login page styling */
    body {
      background-color: #0d0d0d;
      color: #f8f9fa;
    }

    .login-card {
      background-color: #111;
      border: 1px solid #222;
      box-shadow: 0 0 20px rgba(255, 193, 7, 0.1);
      transition: all 0.3s ease-in-out;
    }

    .login-card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 30px rgba(255, 193, 7, 0.25);
    }

    .form-control.bg-dark {
      background-color: #1a1a1a !important;
      color: #f8f9fa !important;
      border: 1px solid #444 !important;
      transition: 0.3s;
    }

    .form-control.bg-dark:focus {
      border-color: #ffc107 !important;
      box-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
    }

    .btn-warning {
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-warning:hover {
      background-color: #ffcf33;
      box-shadow: 0 0 15px rgba(255, 193, 7, 0.4);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="images/logo.png" alt="PetCare Logo" width="40" class="me-2">
        PetCare
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
          <li class="nav-item"><a href="adopt.html" class="nav-link">Adopt</a></li>
          <li class="nav-item"><a href="care.html" class="nav-link">Care Guide</a></li>
          <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
          <li class="nav-item"><a href="login.html" class="nav-link active text-warning">Login</a></li>
          <li class="nav-item">
            <a href="register.html" class="nav-link btn btn-warning text-dark px-3 py-1 ms-2">Register</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Login Section -->
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card login-card p-4 rounded-4">
          <h3 class="text-center text-warning mb-3 fw-bold">Welcome Back</h3>
          <p class="text-center text-secondary mb-4">Log in to continue exploring PetCare</p>

          <form id="loginForm" onsubmit="validateLogin(event)">
            <div class="mb-3">
              <label class="form-label text-light">Email Address</label>
              <input type="email" id="loginEmail" class="form-control bg-dark" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
              <label class="form-label text-light">Password</label>
              <input type="password" id="loginPassword" class="form-control bg-dark" placeholder="Enter your password" required>
            </div>
            <div class="text-end mb-3">
              <a href="#" onclick="forgotPassword(); return false;" class="text-warning small">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-warning w-100 py-2">Login</button>
          </form>

          <p class="text-center mt-4 text-secondary">Don’t have an account?
            <a href="register.html" class="text-warning text-decoration-none fw-semibold">Register here</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center py-4 border-top border-secondary">
  <p class="text-secondary mb-0">© 2025 PetCare | By Eiman | All Rights Reserved ✔</p>
</footer>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
  <script src="js/validation.js"></script>
</body>
</html>
