<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - PetCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-dark text-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="images/logo.png" alt="PetCare Logo" width="40" class="me-2">
      PetCare
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
        <li class="nav-item"><a href="adopt.html" class="nav-link">Adopt</a></li>
        <li class="nav-item"><a href="care.html" class="nav-link">Care Guide</a></li>
        <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
        <li class="nav-item"><a href="login.html" class="nav-link">Login</a></li>
        <li class="nav-item"><a href="register.html" class="nav-link btn btn-primary text-light px-3 py-1 ms-2">Register</a></li>
      </ul>
    </div>
  </div>
</nav>


  <section class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card bg-secondary text-light shadow-lg">
          <div class="card-body p-4">
            <h3 class="text-center mb-4">Create Account</h3>
            <form onsubmit="validateRegistration(event)">
  <div class="mb-3">
    <label for="regName" class="form-label">Full Name</label>
    <input type="text" id="regName" class="form-control bg-dark text-light border-0" required>
  </div>

  <div class="mb-3">
    <label for="regEmail" class="form-label">Email</label>
    <input type="email" id="regEmail" class="form-control bg-dark text-light border-0" required>
  </div>

  <div class="mb-3">
    <label for="regPassword" class="form-label">Password</label>
    <input type="password" id="regPassword" class="form-control bg-dark text-light border-0" required>
  </div>

  <button type="submit" class="btn btn-warning w-100">Register</button>
</form>

          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script src="js/validation.js"></script>

</body>
</html>
